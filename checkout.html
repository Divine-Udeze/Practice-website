<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | Mercedes-Benz</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Loader -->
<div id="loader"><h1>Mercedes-Benz</h1></div>

<header>
    <div class="logo">Mercedes-Benz</div>
    <nav>
        <a href="index.html" class="nav-link">Home</a>
    </nav>
</header>

<section id="checkout">
    <div class="checkout-container">
        <h1>Your Cart</h1>
        <div id="cart-items"></div>
        <button id="checkout-btn" class="btn-primary">Proceed to Checkout</button>
    </div>
</section>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartContainer = document.getElementById("cart-items");

if(cart.length === 0){
    cartContainer.innerHTML = "<p>Your cart is empty.</p>";
} else {
    cartContainer.innerHTML = cart.map(item => `<p>${item}</p>`).join("");
}

// Optional: Clear cart after checkout
document.getElementById("checkout-btn").addEventListener("click", () => {
    alert("Checkout completed! Thank you for your purchase.");
    localStorage.removeItem("cart");
    window.location.href = "index.html";
});
</script>

</body>
</html>
